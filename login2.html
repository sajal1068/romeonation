<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

  <div class="bg-white p-8 rounded-2xl shadow-sm w-full max-w-md border border-gray-100">
    <!-- Header/Logo Area -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-600 text-white font-bold text-xl mb-4">
        V
      </div>
      <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Welcome back</h2>
      <p class="text-sm text-gray-500 mt-1">Please enter your details to sign in</p>
    </div>

    <!-- Login Form -->
    <form action="#" method="POST" class="space-y-5">
      <!-- Email Input Field -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          required 
          placeholder="you@example.com"
          class="w-full px-3.5 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition"
        >
      </div>

      <!-- Password Input Field -->
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <a href="#" class="text-xs font-semibold text-indigo-600 hover:text-indigo-500 transition">Forgot password?</a>
        </div>
        <input 
          type="password" 
          id="password" 
          name="password" 
          required 
          placeholder="••••••••"
          class="w-full px-3.5 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition"
        >
      </div>

      <!-- Remember Me Checkbox -->
      <div class="flex items-center">
        <input 
          type="checkbox" 
          id="remember-me" 
          name="remember-me" 
          class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded transition"
        >
        <label for="remember-me" class="ml-2 block text-sm text-gray-600 select-none">
          Remember me for 30 days
        </label>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150"
      >
        Sign in
      </button>
    </form>

    <!-- Footer Footer Link -->
    <div class="mt-6 text-center text-sm text-gray-500">
      Don't have an account? 
      <a href="#" class="font-semibold text-indigo-600 hover:text-indigo-500 transition">Sign up</a>
    </div>
  </div>

</body>
</html>
