<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Ibot Investments</title>   
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 h-full min-h-screen relative overflow-x-hidden flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans">

    
    <img src="assets/images/bg-registration.jpg" 
         alt="Luxury Wealth Background" 
         class="absolute inset-0 w-full h-full object-cover mix-blend-luminosity opacity-10 pointer-events-none z-0" 
         loading="lazy" />    
    
    <div class="absolute top-0 left-0 w-[400px] h-[400px] bg-amber-500/[0.02] blur-[130px] rounded-full pointer-events-none z-0"></div>
    <div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-yellow-600/[0.02] blur-[130px] rounded-full pointer-events-none z-0"></div>

   
    <div class="max-w-2xl w-full space-y-8 relative z-10 bg-zinc-900/40 backdrop-blur-md border border-amber-500/20 hover:border-amber-500/30 rounded-2xl p-8 sm:p-10 shadow-[0_0_50px_rgba(245,158,11,0.06)] hover:shadow-[0_0_60px_rgba(245,158,11,0.1)] transition-all duration-500">
        
       
        <div class="text-center space-y-2">
            <div class="mx-auto w-14 h-14 rounded-xl bg-zinc-900 border-2 border-amber-500/40 text-amber-400 flex items-center justify-center shadow-lg shadow-amber-500/10 bg-gradient-to-br from-zinc-900 to-zinc-950/80">
                <svg class="w-7 h-7 filter drop-shadow-[0_0_8px_rgba(245,158,11,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                </svg>
            </div>
            <h2 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight pt-2">
                Create Your Account
            </h2>
            <p class="text-sm text-zinc-400 font-light">
                Join <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-amber-500 font-medium">Ibot Investments</span> and expand your portfolio
            </p>
        </div>

        
        <form class="mt-8 space-y-6" action="#" method="POST">           
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">  
                
                <div class="space-y-1.5">
                    <label for="first-name" class="text-xs font-bold tracking-widest text-zinc-400 uppercase">
                        First Name
                    </label>
                    <input id="first-name" name="first-name" type="text" required 
                           class="block w-full px-4 py-3 bg-zinc-950 border border-zinc-900 rounded-lg text-white placeholder-zinc-700 focus:outline-none focus:border-amber-500/40 text-sm font-light transition duration-300"
                           placeholder="John">
                </div>
                
               
                <div class="space-y-1.5">
                    <label for="last-name" class="text-xs font-bold tracking-widest text-zinc-400 uppercase">
                        Last Name
                    </label>
                    <input id="last-name" name="last-name" type="text" required 
                           class="block w-full px-4 py-3 bg-zinc-950 border border-zinc-900 rounded-lg text-white placeholder-zinc-700 focus:outline-none focus:border-amber-500/40 text-sm font-light transition duration-300"
                           placeholder="Doe">
                </div>
                
                
                <div class="space-y-1.5 sm:col-span-2">
                    <label for="email" class="text-xs font-bold tracking-widest text-zinc-400 uppercase">
                        Email Address
                    </label>
                    <input id="email" name="email" type="email" autocomplete="email" required 
                           class="block w-full px-4 py-3 bg-zinc-950 border border-zinc-900 rounded-lg text-white placeholder-zinc-700 focus:outline-none focus:border-amber-500/40 text-sm font-light transition duration-300"
                           placeholder="john@example.com">
                </div>
                
                
                <div class="space-y-1.5 relative">
                    <label for="password" class="text-xs font-bold tracking-widest text-zinc-400 uppercase">
                        Password
                    </label>
                    <div class="relative">
                        <input id="password" name="password" type="password" required 
                               class="block w-full px-4 py-3 bg-zinc-950 border border-zinc-900 rounded-lg text-white placeholder-zinc-700 focus:outline-none focus:border-amber-500/40 text-sm font-light transition duration-300 pr-10"
                               placeholder="••••••••">
                        <button type="button" onclick="toggleVisibility('password', 'eyeIcon1')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-zinc-500 hover:text-amber-400 transition duration-300">
                            <svg id="eyeIcon1" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="space-y-1.5 relative">
                    <label for="confirm-password" class="text-xs font-bold tracking-widest text-zinc-400 uppercase">
                        Confirm Password
                    </label>
                    <div class="relative">
                        <input id="confirm-password" name="confirm-password" type="password" required 
                               class="block w-full px-4 py-3 bg-zinc-950 border border-zinc-900 rounded-lg text-white placeholder-zinc-700 focus:outline-none focus:border-amber-500/40 text-sm font-light transition duration-300 pr-10"
                               placeholder="••••••••">
                        <button type="button" onclick="toggleVisibility('confirm-password', 'eyeIcon2')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-zinc-500 hover:text-amber-400 transition duration-300">
                            <svg id="eyeIcon2" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

            </div>
            
           
            <div class="flex items-start">
                <input id="terms" name="terms" type="checkbox" required
                       class="mt-1 h-4 w-4 rounded border-zinc-900 bg-zinc-950 text-amber-500 focus:ring-0 focus:ring-offset-0 transition duration-300 cursor-pointer">
                <label for="terms" class="ml-2 block text-xs sm:text-sm text-zinc-400 font-light cursor-pointer select-none leading-relaxed">
                    I agree to the <a href="#terms" class="text-amber-500 font-medium hover:underline">Terms of Service</a> and <a href="#privacy" class="text-amber-500 font-medium hover:underline">Privacy Policy</a>.
                </label>
            </div>
            
            
            <div>
                <button type="submit" 
                        class="w-full inline-flex items-center justify-center gap-2 bg-gradient-to-r from-zinc-900 to-zinc-950 hover:from-amber-400 hover:to-amber-500 border border-zinc-800 hover:border-amber-500/20 text-zinc-300 hover:text-zinc-950 text-sm font-bold tracking-widest uppercase px-6 py-3.5 rounded-lg shadow-xl transition-all duration-300 group">
                    Create Account
                    <svg class="w-4 h-4 text-amber-400 group-hover:text-zinc-950 transform group-hover:translate-x-1 transition duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </div>
        </form>
        
        
        <div class="text-center pt-2">
            <p class="text-xs sm:text-sm text-zinc-500 font-light">
                Already have an account? 
                <a href="login.html" class="font-bold text-white hover:text-amber-400 tracking-wide transition duration-300 ml-1">
                    Sign In
                </a>
            </p>
        </div>

    </div>

    
    <script>
        function toggleVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input && icon) {
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path>`;
                } else {
                    input.type = 'password';
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
                }
            }
        }
    </script>
</body>
</html>
